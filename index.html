    .img-wrapper {

    .img {

    }

    }

    .label {
      position: absolute;
      top: 0;
      left: 0;
      transform: translate(-50%, -100%);
      margin-top: 6px;
      font-size: 15px;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;

      font-family: "Noto Sans KR", sans-serif;
      font-optical-sizing: auto;
      font-weight: 900;

      padding: 8px 16px 10px 16px;
      border-radius: 21px;
    }

    .img-wrapper:hover .label {
      opacity: 1;
    }

    .hide-label .label {
      display: none !important;
    }

    .mountain-layer {
      z-index: 1;
    }

    .bg-layer {
      z-index: 2;
    }

      z-index: 3;
    }

    .cursor {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyY5zX0YzltmhcDQSuEaNSUxTIJqfvJLscVEK25M8km9JsSHfjbHbljr3BxhPiymjoRgA/exec';

const firebaseConfig = {
    apiKey: "AIzaSyD6EC6TaaXKVpJc9g0kpts9JVmSBRleOsc",
    authDomain: "sounds-in-motion.firebaseapp.com",
    databaseURL: "https://sounds-in-motion-default-rtdb.firebaseio.com",
    projectId: "sounds-in-motion",
    storageBucket: "sounds-in-motion.firebasestorage.app",
    messagingSenderId: "495934795694",
    appId: "1:495934795694:web:3bc59be8db26e7637da23f",
    measurementId: "G-CS01H47WCE"
  };

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const wall = document.getElementById('wall');

const loadedImages = new Map();

async function loadImages() {

  const res = await fetch(APPS_SCRIPT_URL);
  const images = await res.json();

  const currentIds = new Set(images.map(i => i.id));

  loadedImages.forEach((obj, id) => {
    if (!currentIds.has(id)) {
      obj.wrapper.style.opacity = 0;
      setTimeout(() => obj.wrapper.remove(), 300);
      loadedImages.delete(id);
      db.ref('positions/' + id).remove();
    }
  });

  images.forEach(imgData => {

    const rawName = imgData.name || '';
    const cleanName = rawName.replace(/\.[^/.]+$/, "");

    if (loadedImages.has(imgData.id)) {
      const existing = loadedImages.get(imgData.id);

      if (existing.label.textContent !== cleanName) {
        existing.label.textContent = cleanName;
      }

      return;
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'img-wrapper';

    if (cleanName.startsWith('bg_')) {
      wrapper.classList.add('hide-label');
      if (cleanName.startsWith('bg_mountain')) {
        wrapper.classList.add('mountain-layer');
      } else {
        wrapper.classList.add('bg-layer');
      }
    } else {
      wrapper.classList.add('front-layer');
    }

    const img = document.createElement('img');
    img.src = imgData.url;
    img.className = 'img';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = cleanName;

    wrapper.appendChild(img);
    wrapper.appendChild(label);

    wall.appendChild(wrapper);

    loadedImages.set(imgData.id, {
      wrapper,
      img,
      label
    });

    const ref = db.ref('positions/' + imgData.id);

    ref.on('value', snap => {

      const d = snap.val();

      if (d) {
        wrapper.style.left = d.x + 'px';
        wrapper.style.top = d.y + 'px';
      } else {
        ref.set({
          x: Math.random() * (window.innerWidth - 300),
          y: Math.random() * (window.innerHeight - 300)
        });
      }
    });

    makeDraggable(wrapper, ref);
  });
}

loadImages();
setInterval(loadImages, 1000);


function makeDraggable(el, ref) {

  let isDragging = false;

  let currentX = 0;
  let currentY = 0;

  let startX = 0;
  let startY = 0;

  el.addEventListener('mousedown', (e) => {

    isDragging = true;

    startX = e.clientX + window.scrollX - el.offsetLeft;
    startY = e.clientY + window.scrollY - el.offsetTop;

    if (el.classList.contains('mountain-layer')) {
      el.style.zIndex = 1;
    } else if (el.classList.contains('bg-layer')) {
      el.style.zIndex = 2;
    } else {
      el.style.zIndex = 3;
    }

    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {

    if (!isDragging) return;

    currentX = e.clientX + window.scrollX - startX;
    currentY = e.clientY + window.scrollY - startY;

    el.style.left = currentX + 'px';
    el.style.top = currentY + 'px';

    ref.set({
      x: currentX,
      y: currentY
    });
  });

  document.addEventListener('mouseup', () => {

    if (!isDragging) return;

    isDragging = false;

    if (el.classList.contains('mountain-layer')) {
      el.style.zIndex = 1;
    } else if (el.classList.contains('bg-layer')) {
      el.style.zIndex = 2;
    } else {
      el.style.zIndex = 3;
    }

  });
}

const cursorsRef = db.ref('cursors');
const myId = Math.random().toString(36).substr(2, 9);
const myColor = `hsl(${Math.random() * 360}, 80%, 60%)`;

const cursorEls = {};

let lastMove = 0;

document.addEventListener('mousemove', (e) => {

  const now = Date.now();
  if (now - lastMove < 16) return;
  lastMove = now;

  cursorsRef.child(myId).set({
    // x: e.clientX,
    // y: e.clientY,
    x: e.clientX + window.scrollX,
    y: e.clientY + window.scrollY,
    color: myColor
  });
});

const myCursorRef = cursorsRef.child(myId);
myCursorRef.onDisconnect().remove();

cursorsRef.on('value', snap => {

  const data = snap.val() || {};

  Object.keys(data).forEach(id => {

    const c = data[id];

    if (!cursorEls[id]) {
      const el = document.createElement('div');
      el.className = 'cursor';
      document.body.appendChild(el);
      cursorEls[id] = el;
    }

    cursorEls[id].style.left = c.x + 'px';
    cursorEls[id].style.top = c.y + 'px';
    cursorEls[id].style.background = c.color || 'white';
  });

  Object.keys(cursorEls).forEach(id => {
    if (!data[id]) {
      cursorEls[id].remove();
      delete cursorEls[id];
    }
  });
});


window.addEventListener(
  'wheel',
  (e) => {

    e.preventDefault();

    const scrollAmount = e.deltaY + e.deltaX;

    const maxScroll =
      document.documentElement.scrollWidth - window.innerWidth;

    let nextScroll = window.scrollX + scrollAmount;

    if (nextScroll >= maxScroll - 2) {
      window.scrollTo({
        left: 0,
        behavior: 'auto'
      });

      return;
    }

    if (nextScroll <= 0) {
      window.scrollTo({
        left: 0,
        behavior: 'auto'
      });

      return;
    }

    window.scrollTo({
      left: nextScroll,
      behavior: 'auto'
    });

  },
  { passive: false }
);
</script>
