     <div id="gallery"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbynPp75m88ssLqnl-QafuZhz84R1Uqp60bhTG0j6SJ00MmlFL6dXgmIy7s8aQuDatLl5Q/exec")
  .then(res => res.json())
  .then(images => {
    const gallery = document.getElementById("gallery");

    images.forEach(img => {
      const image = document.createElement("img");
      image.src = img.url;
      gallery.appendChild(image);
    });
  });
</script>
